<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Sora:wght@400;500;600;700&display=swap');
  :root{
    --bg-0:#08090c;--bg-1:#0e1015;--bg-2:#14171e;--bg-3:#1b1f28;--bg-4:#232834;
    --border:#2a303c;--border-h:#3a4254;
    --text:#dce1eb;--text-dim:#8891a4;--text-faint:#555d6f;
    --accent:#6c5ce7;--accent-soft:#1c1740;--accent-glow:rgba(108,92,231,0.15);
    --green:#00cec9;--green-soft:#0a2b2b;
    --orange:#fdcb6e;--orange-soft:#2a2410;
    --red:#ff6b6b;--red-soft:#2a1418;
    --blue:#74b9ff;--blue-soft:#0f1f35;
    --pink:#fd79a8;--pink-soft:#2a1420;
    --font:"Sora",-apple-system,BlinkMacSystemFont,sans-serif;
    --mono:"IBM Plex Mono",monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{width:420px;max-height:560px;font-family:var(--font);background:var(--bg-0);color:var(--text);overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
  body::-webkit-scrollbar{width:4px;}body::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

  /* Header */
  .header{padding:14px 16px 10px;background:var(--bg-1);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;}
  .header-top{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .logo{width:30px;height:30px;background:linear-gradient(135deg,var(--accent),#a29bfe);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:0 3px 12px var(--accent-glow);}
  .brand{flex:1;}
  .brand-name{font-size:14px;font-weight:700;color:#f0f3fa;letter-spacing:-0.3px;}
  .brand-count{font-size:9.5px;color:var(--text-faint);font-family:var(--mono);}
  .header-actions{display:flex;gap:4px;}
  .icon-btn{background:none;border:1px solid var(--border);color:var(--text-dim);width:28px;height:28px;border-radius:7px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
  .icon-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft);}
  .icon-btn.active{border-color:var(--accent);color:var(--accent);background:var(--accent-soft);}

  /* Search */
  .search-row{display:flex;gap:6px;}
  .search-input{flex:1;padding:8px 10px 8px 32px;background:var(--bg-2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font);font-size:12px;outline:none;transition:border .2s;}
  .search-input::placeholder{color:var(--text-faint);}
  .search-input:focus{border-color:var(--accent);}
  .search-wrap{flex:1;position:relative;}
  .search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--text-faint);pointer-events:none;}

  /* Filters */
  .filters{display:flex;gap:4px;padding:8px 16px 0;overflow-x:auto;scrollbar-width:none;}
  .filters::-webkit-scrollbar{display:none;}
  .filter-btn{font-family:var(--font);font-size:10px;font-weight:500;padding:4px 10px;border-radius:14px;border:1px solid var(--border);background:none;color:var(--text-dim);cursor:pointer;white-space:nowrap;transition:all .15s;}
  .filter-btn:hover,.filter-btn.active{border-color:var(--accent);color:var(--accent);background:var(--accent-soft);}

  /* Clip List */
  .clip-list{padding:8px 12px;}
  .clip-card{background:var(--bg-2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:6px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
  .clip-card:hover{border-color:var(--border-h);background:var(--bg-3);transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,0.2);}
  .clip-card.pinned{border-left:3px solid var(--orange);}
  .clip-top{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
  .clip-icon{font-size:12px;}
  .clip-type{font-size:9px;font-weight:600;color:var(--text-faint);text-transform:uppercase;letter-spacing:.6px;font-family:var(--mono);}
  .clip-time{font-size:9px;color:var(--text-faint);font-family:var(--mono);margin-left:auto;}
  .clip-text{font-size:12px;color:var(--text);line-height:1.5;word-break:break-word;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
  .clip-text.code{font-family:var(--mono);font-size:11px;background:var(--bg-0);padding:6px 8px;border-radius:6px;border:1px solid var(--border);}
  .clip-text.color-preview{display:flex;align-items:center;gap:8px;}
  .color-swatch{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);flex-shrink:0;}
  .clip-actions{display:flex;gap:4px;margin-top:6px;opacity:0;transition:opacity .15s;}
  .clip-card:hover .clip-actions{opacity:1;}
  .clip-btn{font-family:var(--font);font-size:9.5px;font-weight:500;padding:3px 8px;border-radius:6px;border:1px solid var(--border);background:none;color:var(--text-dim);cursor:pointer;transition:all .12s;}
  .clip-btn:hover{border-color:var(--accent);color:var(--accent);}
  .clip-btn.del:hover{border-color:var(--red);color:var(--red);}
  .clip-source{font-size:9px;color:var(--text-faint);font-family:var(--mono);margin-top:4px;}

  /* Collections panel */
  .collections-panel{padding:8px 12px;display:none;}
  .collections-panel.show{display:block;}
  .col-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:background .15s;border:1px solid var(--border);margin-bottom:5px;background:var(--bg-2);}
  .col-item:hover{background:var(--bg-3);}
  .col-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .col-name{font-size:12px;font-weight:500;flex:1;}
  .col-count{font-size:10px;color:var(--text-faint);font-family:var(--mono);}
  .col-input-row{display:flex;gap:6px;margin-top:8px;}
  .col-input{flex:1;padding:7px 10px;background:var(--bg-0);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font);font-size:12px;outline:none;}
  .col-input::placeholder{color:var(--text-faint);}
  .col-add-btn{font-family:var(--font);font-size:11px;font-weight:600;padding:7px 14px;background:var(--accent);color:#fff;border:none;border-radius:8px;cursor:pointer;transition:opacity .15s;}
  .col-add-btn:hover{opacity:.85;}

  /* Empty state */
  .empty{text-align:center;padding:30px 20px;color:var(--text-faint);}
  .empty-icon{font-size:28px;margin-bottom:8px;}
  .empty-text{font-size:12px;line-height:1.6;}

  /* Footer */
  .footer{padding:8px 12px;display:flex;align-items:center;gap:6px;border-top:1px solid var(--border);background:var(--bg-1);position:sticky;bottom:0;}
  .footer-text{font-size:9px;color:var(--text-faint);flex:1;font-family:var(--mono);}
  .footer-btn{font-family:var(--font);font-size:9.5px;font-weight:500;padding:4px 10px;border-radius:6px;cursor:pointer;transition:all .15s;border:1px solid;}
  .btn-export{color:var(--blue);border-color:var(--blue-soft);background:none;}
  .btn-export:hover{background:var(--blue-soft);}
  .btn-clear{color:var(--red);border-color:var(--red-soft);background:none;}
  .btn-clear:hover{background:var(--red-soft);}

  /* Toast */
  .toast{position:fixed;bottom:50px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--accent);color:#fff;padding:8px 18px;border-radius:8px;font-size:11px;font-weight:600;opacity:0;transition:all .3s cubic-bezier(.16,1,.3,1);pointer-events:none;z-index:999;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <div class="logo">📋</div>
      <div class="brand">
        <div class="brand-name">ClipStack</div>
        <div class="brand-count" id="clip-count">0 clips</div>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="btn-collections" title="Collections">📁</button>
        <button class="icon-btn" id="btn-toggle" title="Pause/Resume">⏸</button>
      </div>
    </div>
    <div class="search-row">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="search" type="text" placeholder="Search clips, URLs, code..." autocomplete="off"/>
      </div>
    </div>
  </div>

  <!-- Filters -->
  <div class="filters" id="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="pinned">📌 Pinned</button>
    <button class="filter-btn" data-filter="url">🔗 Links</button>
    <button class="filter-btn" data-filter="code">💻 Code</button>
    <button class="filter-btn" data-filter="email">📧 Email</button>
    <button class="filter-btn" data-filter="color">🎨 Colors</button>
    <button class="filter-btn" data-filter="number">🔢 Numbers</button>
    <button class="filter-btn" data-filter="text">📋 Text</button>
  </div>

  <!-- Clip List -->
  <div class="clip-list" id="clip-list"></div>

  <!-- Collections Panel (hidden by default) -->
  <div class="collections-panel" id="collections-panel">
    <div id="collections-list"></div>
    <div class="col-input-row">
      <input class="col-input" id="col-name-input" placeholder="New collection name..." />
      <button class="col-add-btn" id="col-add-btn">Create</button>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <span class="footer-text" id="footer-info">100% local · Ctrl+Shift+V</span>
    <button class="footer-btn btn-export" id="btn-export">Export</button>
    <button class="footer-btn btn-clear" id="btn-clear">Clear</button>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="popup.js"></script>
</body>
</html>
